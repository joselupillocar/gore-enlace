<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pantalla de error</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

img{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
animation:parpadeo .15s infinite;
}

#texto{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
color:red;
font-size:48px;
font-weight:bold;
text-shadow:0 0 20px red;
animation:texto .4s infinite;
z-index:10;
}

@keyframes parpadeo{
0%,100%{opacity:1;}
50%{opacity:.65;}
}

@keyframes texto{
0%,100%{opacity:1;}
50%{opacity:.2;}
}
</style>

</head>

<body>

<div id="texto">ERROR 0x666</div>

<img src="484284cf25b5923ede30a0ea55fdd52b.jpg" alt="Imagen">

<audio id="terror" loop>
<source src="u_g0akwz8ml1-lamentos-del-infierno-194453.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("terror");

function iniciarAudio() {
  audio.play().catch(() => {});
}

document.addEventListener("click", iniciarAudio, { once: true });
document.addEventListener("touchstart", iniciarAudio, { once: true });
</script>

</body>
</html>
